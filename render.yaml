# Render Blueprint for n8n — World Cup workflows, Postgres-backed (persists data).
# No secrets in this file: DB creds are injected via `fromDatabase`, and the
# encryption key is generated by Render. Safe to commit.
#
# Notes:
#  - Postgres (free ~30 days) persists workflows/credentials across restarts.
#  - Free web service still sleeps after ~15 min idle -> use an external pinger
#    (see README) to keep it awake so Schedule triggers fire.
databases:
  - name: n8n-worldcup-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: n8n-worldcup
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest
    plan: free
    region: oregon              # US region -> Telegram/Meta reachable
    healthCheckPath: /healthz
    envVars:
      - key: N8N_PORT
        value: "10000"          # Render routes to port 10000
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_SECURE_COOKIE
        value: "true"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"   # free plan = 512MB; lift Node heap above the 256MB default
      - key: N8N_DIAGNOSTICS_ENABLED
        value: "false"                        # trim background memory/telemetry
      - key: N8N_RUNNERS_GRANT_TOKEN_TTL
        value: "300"                          # slow free CPU: give the task runner time to register
      - key: GENERIC_TIMEZONE
        value: Asia/Karachi
      - key: TZ
        value: Asia/Karachi
      - key: N8N_ENCRYPTION_KEY
        generateValue: true     # Render generates + persists this; not in git
      - key: N8N_HOST
        value: n8n-worldcup.onrender.com
      - key: WEBHOOK_URL
        value: https://n8n-worldcup.onrender.com/
      # --- Postgres connection injected from the managed DB above (no secrets in git) ---
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-worldcup-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-worldcup-db
          property: port
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-worldcup-db
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-worldcup-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-worldcup-db
          property: password
      - key: DB_POSTGRESDB_SCHEMA
        value: public
